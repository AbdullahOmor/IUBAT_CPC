<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hall of Fame - IUBAT CP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #05070a;
    --bg-panel: rgba(15, 20, 30, 0.7);
    --bg-card: rgba(11, 15, 23, 0.85);
    --line: rgba(255, 255, 255, 0.06);
    --line-active: rgba(234, 179, 8, 0.3); /* Cyber Gold Theme */
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --accent: #eab308; 
    --accent-glow: rgba(234, 179, 8, 0.15);
    --ac-green: #10b981; 
    --wa-red: #ef4444;
    --r-gray: #94a3b8;
    --r-cyan: #22d3ee;
    --r-blue: #3b82f6;
    --r-violet: #a855f7;
    --r-orange: #f97316;
  }

  * { box-sizing: border-box; transition: all 0.2s ease-in-out; }
  html, body { margin: 0; padding: 0; }
  body {
    background: 
      radial-gradient(circle at 50% 20%, rgba(234, 179, 8, 0.08), transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.04), transparent 50%),
      var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    backdrop-filter: blur(100px);
  }

  .scanlines {
    pointer-events: none;
    position: fixed; inset: 0;
    background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.005) 0px, rgba(255,255,255,0.005) 1px, transparent 1px, transparent 4px);
    z-index: 10;
  }

  /* Admin Console Drawer */
  .dev-drawer {
    background: #0b0f17;
    border-bottom: 2px solid var(--wa-red);
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    z-index: 100;
  }
  .dev-drawer.open { max-height: 180px; }
  .dev-container {
    max-width: 1140px;
    margin: 0 auto;
    padding: 24px;
  }
  .dev-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--wa-red);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 700;
    margin: 0 0 14px 0;
  }
  .dev-form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)) auto;
    gap: 12px;
    align-items: flex-end;
  }
  .dev-input {
    background: rgba(0,0,0,0.4) !important;
    border: 1px solid rgba(239, 68, 68, 0.2) !important;
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    outline: none;
    font-family: inherit;
    font-size: 13px;
    width: 100%;
  }
  .dev-input:focus { border-color: var(--wa-red) !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.15) !important;}
  .dev-btn {
    background: var(--wa-red);
    color: white;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(239, 68, 68, 0.2);
  }
  .dev-btn:hover { box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4); }

  header {
    position: relative;
    padding: 60px 24px 40px;
    text-align: center;
    border-bottom: 1px solid var(--line);
  }
  .back-btn {
    position: absolute;
    top: 30px; left: 30px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
    border: 1px solid var(--line);
    padding: 8px 16px;
    border-radius: 10px;
    background: rgba(255,255,255,0.02);
  }
  .back-btn:hover { color: #fff; border-color: var(--text-dim); }
  
  h1 {
    font-weight: 800;
    font-size: clamp(32px, 5vw, 46px);
    letter-spacing: -0.03em;
    margin: 0 0 12px;
    color: #fff;
  }
  h1 span {
    color: var(--accent);
    text-shadow: 0 0 40px var(--accent-glow);
  }

  main {
    max-width: 1140px;
    margin: 0 auto;
    padding: 40px 24px 100px;
  }

  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 35px;
    margin-bottom: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    backdrop-filter: blur(12px);
  }
  .panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 30px 0;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 600;
  }
  .panel-title::after {
    content: "";
    flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--line-active), transparent);
  }

  /* List Mechanics */
  .hof-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
  }

  /* Legend Cards */
  .legend-card {
    background: var(--bg-card);
    border: 1px solid rgba(234, 179, 8, 0.1);
    border-radius: 20px;
    padding: 32px;
    position: relative;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .legend-card:hover {
    border-color: rgba(234, 179, 8, 0.5);
    box-shadow: 0 20px 45px rgba(0,0,0,0.4), 0 0 30px var(--accent-glow);
    transform: translateY(-2px);
  }

  .avatar-frame {
    position: relative;
    flex-shrink: 0;
  }
  .legend-avatar {
    width: 68px; height: 68px;
    border-radius: 16px;
    background: #131924;
    object-fit: cover;
    border: 1px solid rgba(234, 179, 8, 0.3);
  }
  .legend-card:hover .legend-avatar {
    border-color: var(--accent);
  }

  .rank-number {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 15px;
    color: var(--text-dim);
    flex-shrink: 0;
    width: 30px;
    text-align: center;
  }

  .legend-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .legend-name {
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .legend-cf {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
  }
  .legend-rating {
    font-size: 14px;
    font-weight: 700;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .legend-peak {
    font-size: 11.5px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .year-tag {
    position: absolute;
    top: 16px; right: 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: rgba(234, 179, 8, 0.08);
    border: 1px solid rgba(234, 179, 8, 0.15);
    padding: 3px 8px;
    border-radius: 6px;
    color: var(--accent);
    text-transform: capitalize;
  }

  .del-btn {
    position: absolute;
    bottom: 16px; right: 16px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: none;
  }
  body.dev-authorized .del-btn { display: block; }
  .del-btn:hover { color: var(--wa-red); }

  .empty {
    text-align: center;
    padding: 60px;
    color: var(--text-dim);
    font-size: 14px;
    grid-column: 1 / -1;
  }

  /* Skeleton Loading */
  .skeleton-card {
    background: rgba(255, 255, 255, 0.01);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 32px;
    display: flex; gap: 24px; align-items: center;
  }
  .skeleton-avatar { width: 68px; height: 68px; border-radius: 16px; background: rgba(255,255,255,0.03); }
  .skeleton-line { height: 12px; background: rgba(255,255,255,0.03); border-radius: 4px; animation: pulse 1.5s infinite ease-in-out; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="scanlines"></div>

<!-- Admin Terminal/Insert Node Drawer -->
<div class="dev-drawer" id="devDrawer">
  <div class="dev-container">
    <p class="dev-title" id="drawerTitle">// Secure Archival Access Node</p>
    
    <!-- Step 1: Password Lock -->
    <div class="dev-form" id="authSection">
      <input type="password" id="devPassword" class="dev-input" placeholder="Authorization Token...">
      <button id="devAuthBtn" class="dev-btn">Unlock Records</button>
    </div>

    <!-- Step 2: Insert Form (Hidden until authorized) -->
    <form id="hofForm" style="display: none;" class="dev-form-grid">
      <div>
        <label style="font-size:10px; color:var(--text-dim)">Legend Name</label>
        <input type="text" id="legendName" class="dev-input" placeholder="e.g., Anik Sarker" required>
      </div>
      <div>
        <label style="font-size:10px; color:var(--text-dim)">Codeforces Handle</label>
        <input type="text" id="cfHandle" class="dev-input" placeholder="e.g., Tourist" required>
      </div>
      <button type="submit" id="hofSubmitBtn" class="dev-btn" style="background:var(--accent); color:#000;">Archive Legend</button>
    </form>
  </div>
</div>

<header>
  <a href="index.html" class="back-btn">← Main Terminal</a>
  <h1>Hall of <span>Fame</span></h1>
</header>

<main>
  <div class="panel">
    <p class="panel-title">Archived Competitive Programming Icons</p>
    <div class="hof-grid" id="hofContainer">
      <!-- Loading Skeletons -->
      <div class="skeleton-card">
        <div class="skeleton-avatar"></div>
        <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
          <div class="skeleton-line" style="width:50%"></div>
          <div class="skeleton-line" style="width:30%"></div>
          <div class="skeleton-line" style="width:70%; margin-top:4px;"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://zqfzwigipfokwrnzkykj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxZnp3aWdpcGZva3dybnpreWtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NDg2MjgsImV4cCI6MjA5OTUyNDYyOH0.KiA3CAv462bzOZxQBzZrZdzR-zNEwBAL8bxPciHYqJA';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let isDevAuthorized = false;

// Toggle Drawer Hotkey: Ctrl + Shift + Y
window.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'y') {
    e.preventDefault();
    document.getElementById('devDrawer').classList.toggle('open');
    if(!isDevAuthorized) document.getElementById('devPassword').focus();
  }
});

// Admin Verification Block
document.getElementById('devAuthBtn').addEventListener('click', () => {
  const pin = document.getElementById('devPassword').value;
  if(pin === 'IUBATCPC@1991') {
    isDevAuthorized = true;
    document.body.classList.add('dev-authorized');
    document.getElementById('authSection').style.display = 'none';
    document.getElementById('hofForm').style.display = 'grid';
    document.getElementById('drawerTitle').textContent = '// ARCHIVAL REGISTRY WRITE NODE ENABED';
    document.getElementById('drawerTitle').style.color = 'var(--accent)';
    renderHOF(); 
  } else {
    alert('Invalid Authorization Vector.');
  }
});

// Rating tier color, matching standard Codeforces color bands
function ratingColor(rating) {
  if (rating == null) return 'var(--r-gray)';
  if (rating < 1200) return 'var(--r-gray)';
  if (rating < 1400) return 'var(--ac-green)';
  if (rating < 1600) return 'var(--r-cyan)';
  if (rating < 1900) return 'var(--r-blue)';
  if (rating < 2100) return 'var(--r-violet)';
  if (rating < 2400) return 'var(--r-orange)';
  return 'var(--wa-red)';
}

function fixProto(url) {
  if (url && url.startsWith('//')) return 'https:' + url;
  return url || '';
}

const FALLBACK_AVATAR = 'data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23eab308%22><path d=%22M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z%22/></svg>';

// Fetch live Codeforces stats (rating, rank, max rating, avatar) for a batch of handles.
// One handle failing to resolve won't break the rest — each is fetched independently.
async function fetchLiveStats(handles) {
  const results = {};
  await Promise.all(handles.map(async (h) => {
    try {
      const res = await fetch(`https://codeforces.com/api/user.info?handles=${encodeURIComponent(h)}`);
      const data = await res.json();
      if (data.status === 'OK') {
        const u = data.result[0];
        results[h.toLowerCase()] = {
          rating: u.rating ?? null,
          maxRating: u.maxRating ?? null,
          rank: u.rank ?? null,
          maxRank: u.maxRank ?? null,
          avatar: fixProto(u.titlePhoto)
        };
      }
    } catch (err) {
      console.error(`Live fetch failed for ${h}:`, err);
    }
  }));
  return results;
}

// Load and Display Hall of Fame Records
async function renderHOF() {
  const container = document.getElementById('hofContainer');
  const { data: legends, error } = await db
    .from('hall_of_fame')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    container.innerHTML = `<div class="empty" style="color:var(--wa-red)">Link failure: ${error.message}</div>`;
    return;
  }

  if (legends.length === 0) {
    container.innerHTML = '<div class="empty">The Historical Archive is currently unpopulated.</div>';
    return;
  }

  const live = await fetchLiveStats(legends.map(l => l.cf_handle));

  // Auto-sort by live Codeforces max rating, highest first (unresolved handles sink to the bottom)
  legends.sort((a, b) => {
    const ma = live[a.cf_handle.toLowerCase()]?.maxRating ?? -1;
    const mb = live[b.cf_handle.toLowerCase()]?.maxRating ?? -1;
    return mb - ma;
  });

  container.innerHTML = legends.map((l, idx) => {
    const stats = live[l.cf_handle.toLowerCase()];
    const avatarSrc = (stats && stats.avatar) || fixProto(l.avatar_url) || '';
    const rating = stats ? stats.rating : null;
    const rank = stats ? stats.rank : null;
    const maxRating = stats ? stats.maxRating : null;
    const color = ratingColor(rating);

    const ratingLine = rating != null
      ? `<span class="legend-rating" style="color:${color}">${rating} <span style="text-transform:capitalize; font-family:'Plus Jakarta Sans',sans-serif; font-weight:600;">${escapeHtml(rank || '')}</span></span>`
      : `<span class="legend-rating" style="color:var(--text-dim)">Unrated</span>`;

    const peakLine = maxRating != null
      ? `<span class="legend-peak">Peak ${maxRating}${stats.maxRank ? ' · ' + escapeHtml(stats.maxRank) : ''}</span>`
      : '';

    return `
    <div class="legend-card">
      <span class="rank-number">#${idx + 1}</span>
      ${rank ? `<span class="year-tag" style="color:${color}; border-color:${color}33; background:${color}14;">${escapeHtml(rank)}</span>` : ''}
      <div class="avatar-frame">
        <img class="legend-avatar" src="${avatarSrc}" onerror="this.src='${FALLBACK_AVATAR}'">
      </div>
      <div class="legend-info">
        <p class="legend-name">${escapeHtml(l.name)}</p>
        <span class="legend-cf">@${escapeHtml(l.cf_handle)}</span>
        ${ratingLine}
        ${peakLine}
      </div>
      <button class="del-btn" title="Purge Log" onclick="deleteLegend('${l.id}')">&times;</button>
    </div>
    `
  }).join('');
}

// Write/Insert New Entry — only Name + Handle are entered manually;
// everything CF-related (avatar, rating, rank) is resolved live from the handle.
document.getElementById('hofForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const name = document.getElementById('legendName').value.trim();
  const cf_handle = document.getElementById('cfHandle').value.trim();
  const submitBtn = document.getElementById('hofSubmitBtn');

  submitBtn.disabled = true;
  submitBtn.textContent = 'Verifying handle...';

  // 1. Verify the handle exists on Codeforces and grab an avatar as a fallback/cache
  let avatar_url = null;
  try {
    const response = await fetch(`https://codeforces.com/api/user.info?handles=${encodeURIComponent(cf_handle)}`);
    const data = await response.json();
    if (data.status !== 'OK') {
      alert(`Codeforces handle "${cf_handle}" could not be verified.`);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Archive Legend';
      return;
    }
    avatar_url = fixProto(data.result[0].titlePhoto);
  } catch (err) {
    console.error("Could not verify handle:", err);
    alert('Could not reach Codeforces to verify this handle. Try again in a moment.');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Archive Legend';
    return;
  }

  // 2. Insert into Supabase — avatar_url is stored only as a fallback; rating/rank are always fetched live
  const { error } = await db.from('hall_of_fame').insert([{
    name,
    cf_handle,
    avatar_url
  }]);

  submitBtn.disabled = false;
  submitBtn.textContent = 'Archive Legend';

  if (error) {
    alert(`Archival write failed: ${error.message}`);
  } else {
    document.getElementById('hofForm').reset();
    await renderHOF();
  }
});

// Purge Entry (Admin Exclusive)
window.deleteLegend = async function(id) {
  if (!isDevAuthorized) return;
  if (!confirm("Are you sure you want to completely erase this historical log entry?")) return;
  
  const { error } = await db.from('hall_of_fame').delete().eq('id', id);
  if (error) {
    alert(`Erase execution failure: ${error.message}`);
  } else {
    await renderHOF();
  }
};

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

renderHOF();
</script>
</body>
</html>
