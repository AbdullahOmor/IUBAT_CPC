<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Registration - IUBAT CP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #05070a;
    --bg-panel: rgba(15, 20, 30, 0.7);
    --bg-card: rgba(11, 15, 23, 0.85);
    --line: rgba(255, 255, 255, 0.06);
    --line-active: rgba(168, 85, 247, 0.3); /* Purple Theme for Teams */
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --accent: #a855f7; 
    --accent-glow: rgba(168, 85, 247, 0.15);
    --ac-green: #10b981; 
    --wa-red: #ef4444;
  }

  * { box-sizing: border-box; transition: all 0.2s ease-in-out; }
  html, body { margin: 0; padding: 0; }
  body {
    background: 
      radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.08), transparent 50%),
      radial-gradient(circle at 20% 70%, rgba(59, 130, 246, 0.06), transparent 50%),
      var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    backdrop-filter: blur(100px);
  }

  .scanlines {
    pointer-events: none;
    position: fixed; inset: 0;
    background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.005) 0px, rgba(255,255,255,0.005) 1px, transparent 1px, transparent 4px);
    z-index: 10;
  }

  /* Admin Control Tray */
  .dev-drawer {
    background: #0b0f17;
    border-bottom: 2px solid var(--wa-red);
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    z-index: 100;
  }
  .dev-drawer.open { max-height: 120px; }
  .dev-container {
    max-width: 1140px;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }
  .dev-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--wa-red);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 700;
    margin: 0;
  }
  .dev-form {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .dev-input {
    background: rgba(0,0,0,0.4) !important;
    border: 1px solid rgba(239, 68, 68, 0.2) !important;
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    outline: none;
    font-family: inherit;
    font-size: 13px;
  }
  .dev-input:focus { border-color: var(--wa-red) !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.15) !important;}
  .dev-btn {
    background: var(--wa-red);
    color: white;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(239, 68, 68, 0.2);
  }
  .dev-btn:hover { box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4); }

  header {
    position: relative;
    padding: 60px 24px 40px;
    text-align: center;
    border-bottom: 1px solid var(--line);
  }

  .back-btn {
    position: absolute;
    top: 30px; left: 30px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
    border: 1px solid var(--line);
    padding: 8px 16px;
    border-radius: 10px;
    background: rgba(255,255,255,0.02);
  }
  .back-btn:hover { color: #fff; border-color: var(--text-dim); }
  
  h1 {
    font-weight: 800;
    font-size: clamp(32px, 5vw, 46px);
    letter-spacing: -0.03em;
    margin: 0 0 12px;
    color: #fff;
  }
  h1 span {
    color: var(--accent);
    text-shadow: 0 0 40px var(--accent-glow);
  }

  main {
    max-width: 1140px;
    margin: 0 auto;
    padding: 40px 24px 100px;
  }

  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 35px;
    margin-bottom: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    backdrop-filter: blur(12px);
  }

  .panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 24px 0;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 600;
  }
  .panel-title::after {
    content: "";
    flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--line-active), transparent);
  }

  /* Form Layout */
  .team-form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 25px;
  }
  @media (max-width: 768px) {
    .team-form-grid { grid-template-columns: 1fr; }
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 9px;
  }

  input[type=text], select {
    width: 100%;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 13px 16px;
    border-radius: 12px;
    outline: none;
    cursor: pointer;
  }
  input[type=text]:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 15px var(--accent-glow);
    background: rgba(0, 0, 0, 0.4);
  }
  select option {
    background: #0f141e;
    color: #fff;
  }

  .checkbox-container {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
  }
  .checkbox-container input {
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .submit-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 14px 28px;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(168, 85, 247, 0.2);
  }
  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4);
  }

  /* Upgraded & Enlarged Team Card Grid layout */
  .teams-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 28px;
  }
  .team-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 32px;
    position: relative;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
  }
  .team-card:hover {
    border-color: rgba(168, 85, 247, 0.5);
    box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4), 0 0 30px var(--accent-glow);
    transform: translateY(-2px);
  }

  .team-card-header {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .team-meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .team-card-name {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    margin: 0;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .team-roster-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(168, 85, 247, 0.1);
    border: 1px solid rgba(168, 85, 247, 0.2);
    padding: 3px 8px;
    border-radius: 6px;
  }
  .female-badge {
    background: rgba(244, 63, 94, 0.1);
    color: #f43f5e;
    border: 1px solid rgba(244, 63, 94, 0.2);
    font-size: 9px;
    text-transform: uppercase;
    font-weight: 800;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border-radius: 100px;
    align-self: flex-start;
  }

  .member-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 0;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
  }
  .member-avatar {
    width: 40px; height: 40px;
    border-radius: 8px;
    background: #131924;
    object-fit: cover;
    border: 1px solid var(--line);
  }
  .member-info-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
    min-width: 0;
  }
  .member-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .member-cf {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .del-btn {
    position: absolute;
    top: 16px; right: 16px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    display: none;
    z-index: 10;
  }
  body.dev-authorized .del-btn { display: block; }
  .del-btn:hover { color: var(--wa-red); }

  .status-line {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    margin-top: 15px;
    min-height: 18px;
    font-weight: 500;
  }
  .status-line.ok { color: var(--ac-green); }
  .status-line.err { color: var(--wa-red); }
  .status-line.pending { color: var(--text-dim); }

  .empty {
    text-align: center;
    padding: 60px;
    color: var(--text-dim);
    font-size: 14px;
    grid-column: 1 / -1;
  }

  /* Skeleton Loading Configuration */
  .skeleton-card {
    background: rgba(255, 255, 255, 0.01);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 32px;
    pointer-events: none;
  }
  .skeleton-header-line {
    height: 20px; background: rgba(255,255,255,0.03);
    margin-bottom: 24px; border-radius: 6px;
    width: 65%; animation: pulse 1.5s infinite ease-in-out;
  }
  .skeleton-row {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 0; border-top: 1px solid rgba(255, 255, 255, 0.04);
  }
  .skeleton-avatar { width: 40px; height: 40px; border-radius: 8px; background: rgba(255,255,255,0.03); }
  .skeleton-text { height: 12px; background: rgba(255,255,255,0.03); border-radius: 4px; animation: pulse 1.5s infinite ease-in-out; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="scanlines"></div>

<!-- Admin Terminal Console Drawer -->
<div class="dev-drawer" id="devDrawer">
  <div class="dev-container">
    <p class="dev-title">// Team Operations Control Node</p>
    <div class="dev-form" id="authSection">
      <input type="password" id="devPassword" class="dev-input" placeholder="Authorization Token...">
      <button id="devAuthBtn" class="dev-btn">Unlock Admin</button>
    </div>
    <div id="adminPanelStatus" style="display:none; color: var(--ac-green); font-family: monospace; font-size:12px;">
      [SYSTEM RUNNING IN AUTHORIZED MANAGEMENT MODE]
    </div>
  </div>
</div>

<header>
  <a href="index.html" class="back-btn">← Back to Roster</a>
  <h1>Construct <span>3-Person</span> Teams</h1>
</header>

<main>
  <!-- Team Builder Terminal -->
  <div class="panel">
    <p class="panel-title">Team Formation Module</p>
    
    <form id="teamForm">
      <div style="grid-column: 1 / -1; margin-bottom: 15px;">
        <label for="teamName">Team Unique Name</label>
        <input type="text" id="teamName" placeholder="e.g., Code Crusaders" required>
        
        <label class="checkbox-container">
          <input type="checkbox" id="isFemaleOnly">
          This is an all-female team
        </label>
      </div>

      <div class="team-form-grid">
        <div>
          <label for="member1">Team Member 1</label>
          <select id="member1" required>
            <option value="">Select Member...</option>
          </select>
        </div>
        <div>
          <label for="member2">Team Member 2</label>
          <select id="member2" required>
            <option value="">Select Member...</option>
          </select>
        </div>
        <div>
          <label for="member3">Team Member 3</label>
          <select id="member3" required>
            <option value="">Select Member...</option>
          </select>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Assemble Team</button>
    </form>
    <div class="status-line" id="statusLine"></div>
  </div>

  <!-- Registered Teams List -->
  <div class="panel">
    <p class="panel-title">Active Combat Units</p>
    <div class="teams-grid" id="teamsContainer">
      <!-- Glow Framework Skeletons -->
      <div class="skeleton-card">
        <div class="skeleton-header-line"></div>
        <div class="skeleton-row"><div class="skeleton-avatar"></div><div style="flex:1;"><div class="skeleton-text" style="width:50%; margin-bottom:6px;"></div><div class="skeleton-text" style="width:30%;"></div></div></div>
        <div class="skeleton-row"><div class="skeleton-avatar"></div><div style="flex:1;"><div class="skeleton-text" style="width:60%; margin-bottom:6px;"></div><div class="skeleton-text" style="width:25%;"></div></div></div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton-header-line" style="width:45%"></div>
        <div class="skeleton-row"><div class="skeleton-avatar"></div><div style="flex:1;"><div class="skeleton-text" style="width:40%; margin-bottom:6px;"></div><div class="skeleton-text" style="width:35%;"></div></div></div>
        <div class="skeleton-row"><div class="skeleton-avatar"></div><div style="flex:1;"><div class="skeleton-text" style="width:55%; margin-bottom:6px;"></div><div class="skeleton-text" style="width:20%;"></div></div></div>
      </div>
    </div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://zqfzwigipfokwrnzkykj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxZnp3aWdpcGZva3dybnpreWtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NDg2MjgsImV4cCI6MjA5OTUyNDYyOH0.KiA3CAv462bzOZxQBzZrZdzR-zNEwBAL8bxPciHYqJA';

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let isDevAuthorized = false;
let globalMembers = [];

// Hotkey system: Ctrl + Shift + Y to bring down Admin panel
window.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'y') {
    e.preventDefault();
    document.getElementById('devDrawer').classList.toggle('open');
    if(!isDevAuthorized) document.getElementById('devPassword').focus();
  }
});

document.getElementById('devAuthBtn').addEventListener('click', () => {
  const pin = document.getElementById('devPassword').value;
  if(pin === 'IUBATCPC@1991') {
    isDevAuthorized = true;
    document.body.classList.add('dev-authorized');
    document.getElementById('authSection').style.display = 'none';
    document.getElementById('adminPanelStatus').style.display = 'block';
    document.getElementById('devDrawer').classList.remove('open');
    renderTeams();
  } else {
    alert('Failed verification sequence.');
  }
});

// Load all registered members to populate select inputs
async function populateMemberDropdowns() {
  const { data, error } = await db.from('members').select('id, name, handle').order('name', { ascending: true });
  if (error) {
    console.error('Failed fetching members:', error);
    return;
  }
  globalMembers = data;
  const selectElements = [document.getElementById('member1'), document.getElementById('member2'), document.getElementById('member3')];
  
  selectElements.forEach(select => {
    select.innerHTML = '<option value="">Select Member...</option>';
    data.forEach(m => {
      const option = document.createElement('option');
      option.value = m.id;
      option.textContent = `${m.name} (${m.handle})`;
      select.appendChild(option);
    });
  });
}

// Fetch teams along with their nested members through the many-to-many junction
async function renderTeams() {
  const container = document.getElementById('teamsContainer');
  
  const { data: teams, error } = await db
    .from('teams')
    .select(`
      id, 
      team_name, 
      is_female_only,
      team_members(
        members(id, name, handle, avatar)
      )
    `)
    .order('created_at', { ascending: false });

  if (error) {
    container.innerHTML = `<div class="empty" style="color:var(--wa-red)">Failed to reach node: ${error.message}</div>`;
    return;
  }

  if (teams.length === 0) {
    container.innerHTML = '<div class="empty">No active teams registered yet.</div>';
    return;
  }

  container.innerHTML = teams.map(t => {
    const membersList = t.team_members.map(tm => tm.members).filter(Boolean);
    
    return `
      <div class="team-card">
        <button class="del-btn" title="Dissolve Team" onclick="dropTeam('${t.id}')">&times;</button>
        <div class="team-card-header">
          <div class="team-meta-row">
            <p class="team-card-name">${escapeHtml(t.team_name)}</p>
            <span class="team-roster-count">${membersList.length} / 3 Players</span>
          </div>
          ${t.is_female_only ? '<span class="female-badge">♀ Female Only</span>' : ''}
        </div>
        
        <div class="members-stack">
          ${membersList.map(m => `
            <div class="member-row">
              <img class="member-avatar" src="${m.avatar || ''}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%2394a3b8%22><path d=%22M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z%22/></svg>'">
              <div class="member-info-block">
                <span class="member-name">${escapeHtml(m.name)}</span>
                <span class="member-cf">${escapeHtml(m.handle)}</span>
              </div>
            </div>
          `).join('')}
          ${membersList.length === 0 ? '<div style="color:var(--text-dim); font-size:12px; padding: 10px 0;">No members allocated</div>' : ''}
        </div>
      </div>
    `;
  }).join('');
}

function setStatus(msg, type) {
  const el = document.getElementById('statusLine');
  el.textContent = msg;
  el.className = 'status-line' + (type ? ' ' + type : '');
}

document.getElementById('teamForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const submitBtn = document.getElementById('submitBtn');
  const teamName = document.getElementById('teamName').value.trim();
  const isFemaleOnly = document.getElementById('isFemaleOnly').checked;
  
  const m1 = document.getElementById('member1').value;
  const m2 = document.getElementById('member2').value;
  const m3 = document.getElementById('member3').value;

  if (m1 === m2 || m1 === m3 || m2 === m3) {
    setStatus('Duplicate Selection Error: All 3 team members must be different people.', 'err');
    return;
  }

  submitBtn.disabled = true;
  setStatus('Registering team identity node...', 'pending');

  try {
    const { data: team, error: teamErr } = await db
      .from('teams')
      .insert([{ team_name: teamName, is_female_only: isFemaleOnly }])
      .select()
      .single();

    if (teamErr) throw teamErr;

    const joins = [
      { team_id: team.id, member_id: m1 },
      { team_id: team.id, member_id: m2 },
      { team_id: team.id, member_id: m3 }
    ];

    const { error: joinErr } = await db.from('team_members').insert(joins);
    if (joinErr) {
      await db.from('teams').delete().eq('id', team.id);
      throw joinErr;
    }

    setStatus(`Team "${teamName}" assembled and saved successfully!`, 'ok');
    document.getElementById('teamForm').reset();
    await renderTeams();
  } catch (err) {
    console.error(err);
    setStatus(`Failed: ${err.message || 'Database error occurred.'}`, 'err');
  } finally {
    submitBtn.disabled = false;
  }
});

window.dropTeam = async function(teamId) {
  if (!isDevAuthorized) return;
  if (!confirm("Are you sure you want to permanently dissolve this team?")) return;
  
  const { error } = await db.from('teams').delete().eq('id', teamId);
  if (error) {
    alert(`Dissolution abort: ${error.message}`);
  } else {
    await renderTeams();
  }
};

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

populateMemberDropdowns();
renderTeams();
</script>
</body>
</html>
