<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICPC LEDGER — Team Registry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg: #05070a; --bg-panel: rgba(12, 17, 26, 0.7); --bg-panel-2: rgba(20, 27, 38, 0.6); --border: #1e293b; --border-soft: #0f172a; --accent: #2dd4bf; --accent-dim: #14524a; --text: #f8fafc; --muted: #94a3b8; --muted-2: #475569; --gold: #e6b93a; --silver: #b9c2cf; --bronze: #c9803f; --danger: #ef4444; --cf-gray: #808080; --cf-green: #17a04e; --cf-cyan: #03a9a4; --cf-blue: #3778e8; --cf-purple: #a63bd6; --cf-orange: #e08a1e; --cf-red: #e2445a; --font-mono: 'JetBrains Mono', monospace; --font-body: 'Inter', sans-serif; }
  html { scroll-behavior: smooth; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background: var(--bg); background-image: radial-gradient(circle at 15% 0%, rgba(45,212,191,0.06), transparent 40%), radial-gradient(circle at 85% 100%, rgba(45,212,191,0.04), transparent 45%); color: var(--text); font-family: var(--font-body); min-height: 100vh; padding-bottom: 80px; }
  ::selection{ background: var(--accent-dim); color: var(--text); }
  header{ border-bottom: 1px solid var(--border-soft); padding: 28px 24px 22px; display:flex; align-items:flex-end; justify-content:space-between; gap: 20px; flex-wrap: wrap; background: rgba(5, 7, 10, 0.8); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 10; }
  .brand{ display:flex; flex-direction:column; gap:6px; }
  .brand .mark{ font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.28em; color: var(--accent); text-transform: uppercase; }
  .brand h1{ font-family: var(--font-mono); font-weight: 800; font-size: 30px; letter-spacing: -0.01em; }
  .brand h1 span{ color: var(--accent); }
  .brand p{ color: var(--muted); font-size: 13.5px; max-width: 480px; line-height: 1.5; }
  .stat-row{ display:flex; gap: 22px; font-family: var(--font-mono); }
  .stat{ text-align:right; }
  .stat .n{ font-size: 22px; font-weight:700; color: var(--text); }
  .stat .l{ font-size: 10.5px; color: var(--muted); letter-spacing:0.14em; text-transform:uppercase; }
  main{ max-width: 1180px; margin: 0 auto; padding: 32px 24px 0; }
  .panel{ background: var(--bg-panel); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 34px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
  .panel-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 18px; cursor:pointer; }
  .panel-head h2{ font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); display:flex; align-items:center; gap:10px; }
  .panel-head h2::before{ content:"›"; color: var(--accent); font-weight:800; font-size:16px; }
  .chevron{ color: var(--muted); font-family: var(--font-mono); font-size: 12px; transition: transform .3s ease; }
  .chevron.open{ transform: rotate(90deg); }
  .field-label{ font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display:block; margin-bottom: 8px; }
  input[type=text], input[type=url], input[type=number]{ width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-family: var(--font-body); font-size: 14px; outline: none; transition: all .2s ease; }
  input::placeholder{ color: var(--muted-2); }
  input:focus{ border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,212,191,0.1); background: rgba(0,0,0,0.5); }
  .team-name-row{ margin-bottom: 24px; max-width: 420px; }
  .members-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .member-slot{ border: 1px solid var(--border); border-radius: 10px; padding: 16px; background: rgba(255,255,255,0.01); transition: border-color .2s ease; }
  .member-slot:hover { border-color: var(--muted-2); }
  .slot-tag{ font-family: var(--font-mono); font-size: 10px; color: var(--muted-2); letter-spacing: 0.12em; margin-bottom: 12px; display:flex; align-items:center; gap:8px; }
  .dot{ width:6px; height:6px; border-radius:50%; background: var(--muted-2); }
  .handle-status{ font-family: var(--font-mono); font-size: 11px; margin-top: 10px; min-height: 20px; display:flex; align-items:center; gap:8px; }
  .handle-status img{ width:22px; height:22px; border-radius:4px; object-fit:cover; border:1px solid var(--border); }
  .handle-status.ok{ color: var(--accent); }
  .handle-status.err{ color: var(--danger); }
  .handle-status.loading{ color: var(--muted); }
  .panel-actions{ display:flex; justify-content:flex-end; align-items: center; gap:16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(6, 32, 28, 0.3); border-top-color: #06201c; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  button{ font-family: var(--font-mono); font-size: 12.5px; font-weight: 600; letter-spacing: 0.06em; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); padding: 12px 20px; cursor: pointer; transition: all .2s ease; text-transform: uppercase; }
  button:hover{ border-color: var(--accent); color: var(--accent); }
  button.primary{ background: var(--accent); border-color: var(--accent); color: #06201c; box-shadow: 0 4px 14px rgba(45,212,191,0.15); }
  button.primary:hover{ background: #4de0cb; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(45,212,191,0.25); }
  button.primary:disabled{ opacity:0.6; cursor:not-allowed; transform: none; box-shadow: none; }
  button.ghost{ border-color: transparent; color: var(--muted); padding: 8px 10px; }
  button.ghost:hover{ color: var(--danger); background: rgba(239, 68, 68, 0.1); border-color: transparent; }
  button.small{ padding: 8px 14px; font-size: 11px; }
  .err-msg{ color: var(--danger); font-family: var(--font-mono); font-size: 12px; text-align:right; }
  .teams-toolbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px; gap:12px; flex-wrap:wrap;}
  .teams-toolbar h2{ font-family: var(--font-mono); font-size: 13px; letter-spacing:0.14em; color: var(--muted); text-transform:uppercase; }
  .search-box{ max-width: 240px; width: 100%; }
  .search-box input{ padding: 10px 14px; font-size: 13px; border-radius: 8px; }
  .teams-grid{ display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
  .team-card{ background: var(--bg-panel); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; display:flex; flex-direction:column; transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; }
  .team-card:hover { border-color: var(--muted-2); transform: translateY(-2px); box-shadow: 0 8px 24px -8px rgba(0,0,0,0.4); }
  .team-card-head{ padding: 18px 20px 14px; border-bottom: 1px solid var(--border-soft); display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .team-card-head .tname{ font-family: var(--font-mono); font-weight:700; font-size: 17px; letter-spacing: -0.01em; word-break: break-word; color: var(--text); }
  .team-card-head .tid{ font-family: var(--font-mono); font-size: 10.5px; color: var(--muted-2); margin-top:6px; }
  .members-row{ display:flex; gap:12px; padding: 18px 20px; }
  .member-chip{ flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center; min-width:0; }
  .avatar-wrap{ position:relative; width:56px; height:56px; transition: transform 0.2s ease; }
  .member-chip:hover .avatar-wrap { transform: scale(1.05); }
  .avatar-wrap img{ width:56px; height:56px; border-radius:10px; object-fit:cover; border: 2px solid var(--bg-panel); position: relative; z-index: 2; }
  .avatar-ring{ position:absolute; inset:-2px; border-radius:12px; background: linear-gradient(135deg, var(--ring-color, var(--muted)), transparent); z-index: 1; opacity: 0.8; }
  .mname{ font-size: 12px; font-weight:600; color: var(--text); max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; width:100%;}
  .mhandle{ font-family: var(--font-mono); font-size: 11px; font-weight:700; }
  .mrating{ font-family: var(--font-mono); font-size: 10px; color: var(--muted); background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px;}
  .card-divider{ height:1px; background: var(--border-soft); margin: 0 20px; }
  .ledger-toggle{ display:flex; align-items:center; justify-content:space-between; padding: 14px 20px; cursor:pointer; user-select:none; transition: background 0.2s ease; }
  .ledger-toggle:hover { background: rgba(255,255,255,0.02); }
  .lt-label{ font-family: var(--font-mono); font-size: 11px; letter-spacing:0.1em; color: var(--muted); text-transform:uppercase; display:flex; align-items:center; gap:8px; }
  .ledger-count{ background: rgba(45,212,191,0.1); border:1px solid rgba(45,212,191,0.2); border-radius: 20px; padding: 2px 8px; font-size: 10.5px; color: var(--accent); font-weight: 700; }
  .ledger{ padding: 4px 20px 20px; }
  .ledger-empty{ font-family: var(--font-mono); font-size: 11.5px; color: var(--muted-2); padding: 10px 0 16px; text-align: center; font-style: italic;}
  .chain{ position:relative; }
  .block{ position:relative; padding-left: 28px; padding-bottom: 20px; }
  .block:last-child{ padding-bottom: 4px; }
  .block::before{ content:""; position:absolute; left:7px; top:16px; bottom:-4px; width:2px; background: repeating-linear-gradient(to bottom, var(--border) 0 6px, transparent 6px 12px); }
  .block:last-child::before{ display:none; }
  .block-node{ position:absolute; left:0; top:2px; width:16px; height:16px; border-radius:4px; background: var(--bg-panel-2); border: 2px solid var(--node-color, var(--muted)); display:flex; align-items:center; justify-content:center; box-shadow: 0 0 8px color-mix(in srgb, var(--node-color) 40%, transparent); }
  .block-node::after{ content:""; width:4px; height:4px; border-radius:50%; background: var(--node-color, var(--muted)); }
  .block-body{ background: rgba(0,0,0,0.2); border: 1px solid var(--border-soft); border-radius: 10px; padding: 12px 14px; display:flex; align-items:center; justify-content:space-between; gap:12px; transition: border-color 0.2s ease, transform 0.2s ease; }
  .block-body:hover { border-color: var(--muted-2); transform: translateX(2px); }
  .block-main{ min-width:0; }
  .block-main .contest{ font-size: 13px; font-weight:600; color: var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .block-main .meta{ font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); margin-top: 5px; display:flex; gap:8px; align-items:center; }
  .block-main .meta a{ color: var(--accent); text-decoration:none; display: inline-flex; align-items: center; gap: 4px; }
  .block-main .meta a:hover{ text-decoration:underline; }
  .pos-badge{ font-family: var(--font-mono); font-weight:800; font-size: 13px; flex-shrink:0; padding: 6px 10px; border-radius: 6px; border: 1px solid color-mix(in srgb, var(--badge-color) 30%, transparent); color: var(--badge-color, var(--muted)); background: color-mix(in srgb, var(--badge-color) 10%, transparent); text-shadow: 0 0 10px color-mix(in srgb, var(--badge-color) 30%, transparent); }
  .del-btn{ opacity:0; transition: all .2s ease; transform: scale(0.9); }
  .block-body:hover .del-btn{ opacity:1; transform: scale(1); }
  .add-ach-row{ padding: 16px 20px 20px; border-top: 1px dashed var(--border-soft); margin-top: 4px; background: rgba(0,0,0,0.1); }
  .add-ach-form{ display:none; gap:10px; }
  .add-ach-form.open{ display:flex; flex-wrap:wrap; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  .add-ach-form input{ font-size:12.5px; padding:10px 12px; }
  .add-ach-form .f-contest{ flex: 1 1 100%; }
  .add-ach-form .f-pos{ flex: 0 1 100px; }
  .add-ach-form .f-link{ flex: 1 1 160px; }
  .add-ach-form .f-actions{ display:flex; gap:8px; margin-left:auto; width: 100%; justify-content: flex-end; margin-top: 4px; }
  .empty-state{ text-align:center; padding: 80px 20px; color: var(--muted); font-family: var(--font-mono); font-size: 13px; border: 1px dashed var(--border); border-radius:14px; background: rgba(0,0,0,0.2); }
  @media (max-width: 768px){ .members-grid{ grid-template-columns: 1fr; } header{ padding: 24px 16px; } main{ padding: 24px 16px 0; } .panel { padding: 20px 16px; } }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="mark">Our Achievements</div>
    <h1>ICPC & IUPC <span>TEAMS</span></h1>
    <h2 class="mark">Teams Who Will Always Be Remembered</h2>
  </div>
  <div class="stat-row">
    <div class="stat"><div class="n" id="statTeams">0</div><div class="l">Teams</div></div>
    <div class="stat"><div class="n" id="statAch">0</div><div class="l">Entries</div></div>
  </div>
</header>

<main>
  <div class="panel">
    <div class="panel-head" id="newTeamToggle">
      <h2>Register a team</h2>
      <span class="chevron open" id="newTeamChevron">▸</span>
    </div>
    <div id="newTeamBody">
      <div class="team-name-row">
        <label class="field-label">Team name</label>
        <input type="text" id="teamNameInput" placeholder="e.g. IUBAT Segfault Squad" maxlength="60">
      </div>
      <div class="members-grid" id="membersGrid"></div>
      <div class="panel-actions">
        <span class="err-msg" id="createErr"></span>
        <button class="primary" id="createTeamBtn">Verify &amp; Create Team</button>
      </div>
    </div>
  </div>
  <div class="teams-toolbar">
    <h2>Registered teams</h2>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Filter by team or handle…">
    </div>
  </div>
  <div class="teams-grid" id="teamsGrid"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function(){
  "use strict";

  const CF_API = "https://codeforces.com/api/user.info?handles=";
  let isAdmin = false;

  // --- Supabase setup ---
  const SUPABASE_URL = 'https://zqfzwigipfokwrnzkykj.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxZnp3aWdpcGZva3dybnpreWtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NDg2MjgsImV4cCI6MjA5OTUyNDYyOH0.KiA3CAv462bzOZxQBzZrZdzR-zNEwBAL8bxPciHYqJA';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Admin Shortcut
  window.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'y') {
      const pin = prompt("Enter Authorization Token:");
      if (pin === 'IUBATCPC@1991') {
        isAdmin = true;
        renderTeams();
        alert('Developer status verified.');
      }
    }
  });

  // Maps a DB row (with nested members/achievements) to the shape the UI expects
  function mapRow(row){
    const members = (row.remembered_team_members || [])
      .slice()
      .sort((a,b) => a.member_id - b.member_id) // no explicit slot column — preserve insert order
      .map(m => ({ name: m.full_name, handle: m.cf_handle, avatar: m.avatar_url, rating: m.rating, rank: m.rank }));
    const achievements = (row.team_achievements || []).map(a => ({
      id: a.achievement_id, contest: a.contest_name, position: a.position, link: a.standings_link, addedAt: new Date(a.added_at).getTime()
    }));
    return { id: row.team_id, name: row.team_name, createdAt: new Date(row.created_at).getTime(), members, achievements };
  }

  async function fetchTeams(){
    const { data, error } = await sb
      .from("remembered_team")
      .select("*, remembered_team_members(*), team_achievements(*)")
      .order("created_at", { ascending: false });
    if (error){ console.error(error); alert("Couldn't load teams from the database."); return []; }
    return data.map(mapRow);
  }

  let teams = [];

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function ratingColor(rating){ if (rating == null) return "var(--cf-gray)"; if (rating < 1200) return "var(--cf-gray)"; if (rating < 1400) return "var(--cf-green)"; if (rating < 1600) return "var(--cf-cyan)"; if (rating < 1900) return "var(--cf-blue)"; if (rating < 2100) return "var(--cf-purple)"; if (rating < 2400) return "var(--cf-orange)"; return "var(--cf-red)"; }
  function posColor(position){ if (position === null || position === undefined || position === "") return "var(--muted)"; const p = Number(position); if (p === 1) return "var(--gold)"; if (p === 2) return "var(--silver)"; if (p === 3) return "var(--bronze)"; return "var(--accent)"; }

  async function fetchCFUsers(handles){
    const unique = [...new Set(handles.filter(Boolean))];
    if (unique.length === 0) return {};
    const res = await fetch(CF_API + unique.map(encodeURIComponent).join(";"));
    const data = await res.json();
    if (data.status !== "OK") throw new Error(data.comment || "Codeforces lookup failed");
    const map = {}; data.result.forEach(u => { map[u.handle.toLowerCase()] = u; }); return map;
  }

  const membersGrid = document.getElementById("membersGrid");
  function slotHTML(i){ return `<div class="member-slot" data-slot="${i}"><div class="slot-tag"><span class="dot"></span>MEMBER ${i}</div><input type="text" class="m-name" placeholder="Full name" maxlength="50"><input type="text" class="m-handle" placeholder="Codeforces handle" maxlength="30"><div class="handle-status" data-status></div></div>`; }
  membersGrid.innerHTML = [1,2,3].map(slotHTML).join("");

  const createErr = document.getElementById("createErr");
  const createBtn = document.getElementById("createTeamBtn");

  document.getElementById("newTeamToggle").addEventListener("click", ()=>{ const body = document.getElementById("newTeamBody"); const chev = document.getElementById("newTeamChevron"); const open = body.style.display !== "none"; body.style.display = open ? "none" : "block"; chev.classList.toggle("open", !open); });

  createBtn.addEventListener("click", async ()=>{
    createErr.textContent = "";
    const teamName = document.getElementById("teamNameInput").value.trim();
    const slots = [...membersGrid.querySelectorAll(".member-slot")];
    const rawMembers = slots.map(s => ({ name: s.querySelector(".m-name").value.trim(), handle: s.querySelector(".m-handle").value.trim() }));
    if (!teamName){ createErr.textContent = "Team name is required."; return; }
    for (const m of rawMembers){ if (!m.name || !m.handle){ createErr.textContent = "All 3 members need a name and a CF handle."; return; } }
    const handlesLower = rawMembers.map(m => m.handle.toLowerCase());
    if (new Set(handlesLower).size !== 3){ createErr.textContent = "Each member needs a distinct CF handle."; return; }
    createBtn.disabled = true; createBtn.innerHTML = '<span class="spinner"></span> Verifying...';
    try{
      const cfMap = await fetchCFUsers(rawMembers.map(m=>m.handle));
      const missing = rawMembers.filter(m => !cfMap[m.handle.toLowerCase()]);
      if (missing.length){
        createErr.textContent = `Handle not found: ${missing.map(m=>m.handle).join(", ")}`;
        slots.forEach((s,i)=>{ const info = cfMap[rawMembers[i].handle.toLowerCase()]; const st = s.querySelector("[data-status]"); if (info){ st.className = "handle-status ok"; st.innerHTML = `<img src="https:${info.titlePhoto}" onerror="this.style.display='none'"> verified`; } else { st.className = "handle-status err"; st.textContent = "not found"; } });
        return;
      }
      const members = rawMembers.map(m => { const info = cfMap[m.handle.toLowerCase()]; return { name: m.name, handle: info.handle, avatar: (info.titlePhoto || "").startsWith("http") ? info.titlePhoto : "https:" + info.titlePhoto, rating: info.rating ?? null, rank: info.rank ?? null }; });

      const newTeamId = uid();
      const { data: teamRow, error: teamErr } = await sb
        .from("remembered_team").insert({ team_id: newTeamId, team_name: teamName }).select().single();
      if (teamErr){ createErr.textContent = "Couldn't save team to the database."; console.error(teamErr); return; }

      const memberRows = members.map(m => ({
        team_id: teamRow.team_id, full_name: m.name, cf_handle: m.handle,
        avatar_url: m.avatar, rating: m.rating, rank: m.rank
      }));
      const { error: memErr } = await sb.from("remembered_team_members").insert(memberRows);
      if (memErr){ createErr.textContent = "Team saved, but members failed to save."; console.error(memErr); return; }

      const team = { id: teamRow.team_id, name: teamRow.team_name, createdAt: new Date(teamRow.created_at).getTime(), achievements: [], members };
      teams.unshift(team); renderTeams();
      document.getElementById("teamNameInput").value = ""; membersGrid.innerHTML = [1,2,3].map(slotHTML).join(""); createErr.textContent = "";
    }catch(err){ createErr.textContent = "Couldn't reach Codeforces API. Try again later."; }
    finally{ createBtn.disabled = false; createBtn.textContent = "Verify & Create Team"; }
  });

  const teamsGrid = document.getElementById("teamsGrid");
  const statTeams = document.getElementById("statTeams");
  const statAch = document.getElementById("statAch");
  const searchInput = document.getElementById("searchInput");
  const openLedgers = new Set();
  const openForms = new Set();
  function escapeHTML(str){ return String(str).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function memberChip(m){ const color = ratingColor(m.rating); return `<div class="member-chip"><div class="avatar-wrap"><img src="${escapeHTML(m.avatar)}" alt="${escapeHTML(m.handle)}" onerror="this.src='https://userpic.codeforces.org/no-title.jpg'"><div class="avatar-ring" style="--ring-color:${color}"></div></div><div class="mname" title="${escapeHTML(m.name)}">${escapeHTML(m.name)}</div><div class="mhandle" style="color:${color}">${escapeHTML(m.handle)}</div><div class="mrating">${m.rating != null ? m.rating : "unrated"}</div></div>`; }

  function blockHTML(a, teamId){
    const color = posColor(a.position);
    const posText = (a.position === null || a.position === undefined || a.position === "") ? "—" : `#${a.position}`;
    return `<div class="block"><div class="block-node" style="--node-color:${color}"></div><div class="block-body"><div class="block-main"><div class="contest" title="${escapeHTML(a.contest)}">${escapeHTML(a.contest)}</div><div class="meta"><span>${new Date(a.addedAt).toLocaleDateString()}</span>${a.link ? `<span>·</span><a href="${escapeHTML(a.link)}" target="_blank" rel="noopener">standings ↗</a>` : ""}</div></div><span class="pos-badge" style="--badge-color:${color}">${posText}</span>${isAdmin ? `<button class="ghost del-btn" data-del-ach="${teamId}|${a.id}" title="Remove entry">✕</button>` : ''}</div></div>`;
  }

  function teamCardHTML(team){
    const achCount = team.achievements.length;
    const ledgerOpen = openLedgers.has(team.id);
    const formOpen = openForms.has(team.id);
    const sortedAch = [...team.achievements].sort((a,b)=> b.addedAt - a.addedAt);
    return `<div class="team-card" data-team="${team.id}"><div class="team-card-head"><div><div class="tname">${escapeHTML(team.name)}</div><div class="tid">ID · ${team.id}</div></div>${isAdmin ? `<button class="ghost" data-del-team="${team.id}" title="Delete team">✕</button>` : ''}</div><div class="members-row">${team.members.map(memberChip).join("")}</div><div class="card-divider"></div><div class="ledger-toggle" data-toggle-ledger="${team.id}"><span class="lt-label">⛓ Achievement chain <span class="ledger-count">${achCount}</span></span><span class="chevron ${ledgerOpen ? "open" : ""}">▸</span></div>${ledgerOpen ? `<div class="ledger">${achCount === 0 ? `<div class="ledger-empty">No entries yet — this team's ledger is empty.</div>` : `<div class="chain">${sortedAch.map(a=>blockHTML(a, team.id)).join("")}</div>`}</div>` : ""}<div class="add-ach-row">${!formOpen ? `<button class="small" data-open-form="${team.id}">+ Add achievement</button>` : `<div class="add-ach-form open" data-form="${team.id}"><input type="text" class="f-contest" placeholder="Contest name" maxlength="120"><input type="number" class="f-pos" placeholder="Position" min="1"><input type="url" class="f-link" placeholder="Standings link (optional)"><div class="f-actions"><button class="small ghost" data-cancel-form="${team.id}">Cancel</button><button class="small primary" data-save-ach="${team.id}">Save</button></div></div>`}</div></div>`;
  }

  function renderTeams(){
    const q = searchInput.value.trim().toLowerCase();
    const filtered = teams.filter(t=>{ if (!q) return true; if (t.name.toLowerCase().includes(q)) return true; return t.members.some(m => m.handle.toLowerCase().includes(q) || m.name.toLowerCase().includes(q)); });
    statTeams.textContent = teams.length; statAch.textContent = teams.reduce((s,t)=> s + t.achievements.length, 0);
    if (filtered.length === 0){ teamsGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">${teams.length === 0 ? "No teams registered yet. Create one above to start the ledger." : "No teams match your search."}</div>`; return; }
    teamsGrid.innerHTML = filtered.map(teamCardHTML).join("");
  }

  teamsGrid.addEventListener("click", async (e)=>{
    const delTeam = e.target.closest("[data-del-team]");
    if (delTeam && isAdmin){
      const id = delTeam.getAttribute("data-del-team");
      if (confirm("Delete this team and its entire achievement ledger?")){
        const { error } = await sb.from("remembered_team").delete().eq("team_id", id);
        if (error){ alert("Couldn't delete team."); console.error(error); return; }
        teams = teams.filter(t => t.id !== id); openLedgers.delete(id); openForms.delete(id); renderTeams();
      }
      return;
    }
    const toggleLedger = e.target.closest("[data-toggle-ledger]");
    if (toggleLedger){ const id = toggleLedger.getAttribute("data-toggle-ledger"); openLedgers.has(id) ? openLedgers.delete(id) : openLedgers.add(id); renderTeams(); return; }
    const openForm = e.target.closest("[data-open-form]");
    if (openForm){ openForms.add(openForm.getAttribute("data-open-form")); renderTeams(); const wrap = teamsGrid.querySelector(`[data-form="${openForm.getAttribute("data-open-form")}"]`); if (wrap) wrap.querySelector(".f-contest").focus(); return; }
    const cancelForm = e.target.closest("[data-cancel-form]");
    if (cancelForm){ openForms.delete(cancelForm.getAttribute("data-cancel-form")); renderTeams(); return; }
    const saveAch = e.target.closest("[data-save-ach]");
    if (saveAch){
      const id = saveAch.getAttribute("data-save-ach"); const form = teamsGrid.querySelector(`[data-form="${id}"]`); const contest = form.querySelector(".f-contest").value.trim(); const posRaw = form.querySelector(".f-pos").value.trim(); const link = form.querySelector(".f-link").value.trim(); if (!contest){ form.querySelector(".f-contest").focus(); return; }
      const position = posRaw === "" ? null : Number(posRaw);
      const { data: achRow, error } = await sb
        .from("team_achievements")
        .insert({ achievement_id: uid(), team_id: id, contest_name: contest, position, standings_link: link || null })
        .select().single();
      if (error){ alert("Couldn't save achievement."); console.error(error); return; }
      const team = teams.find(t => t.id === id);
      team.achievements.push({ id: achRow.achievement_id, contest: achRow.contest_name, position: achRow.position, link: achRow.standings_link, addedAt: new Date(achRow.added_at).getTime() });
      openForms.delete(id); openLedgers.add(id); renderTeams(); return;
    }
    const delAch = e.target.closest("[data-del-ach]");
    if (delAch && isAdmin){
      const [teamId, achId] = delAch.getAttribute("data-del-ach").split("|");
      const { error } = await sb.from("team_achievements").delete().eq("achievement_id", achId);
      if (error){ alert("Couldn't delete achievement."); console.error(error); return; }
      const team = teams.find(t => t.id === teamId); team.achievements = team.achievements.filter(a => a.id !== achId); renderTeams(); return;
    }
  });
  searchInput.addEventListener("input", renderTeams);

  (async function init(){
    teamsGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">Loading teams…</div>`;
    teams = await fetchTeams();
    renderTeams();
  })();
})();
</script>
</body>
</html>
